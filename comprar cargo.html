<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compra de Cargo</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(255, 115, 0, 0.12), transparent 35%),
        #000;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      color: white;
    }

    .container {
      width: 100%;
      max-width: 760px;
      background: #0b0b0d;
      border: 1px solid #242428;
      border-radius: 24px;
      padding: 34px 28px 24px;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.02) inset,
        0 20px 50px rgba(0, 0, 0, 0.55),
        0 0 30px rgba(255, 102, 0, 0.08);
    }

    h1 {
      text-align: center;
      color: #ff6b00;
      font-size: 36px;
      margin-bottom: 28px;
      font-weight: 800;
      letter-spacing: 0.3px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #ff8a2a;
      font-size: 15px;
      font-weight: 700;
    }

    input,
    select,
    button {
      width: 100%;
      border-radius: 14px;
      border: 1px solid #2d2f36;
      background: #151618;
      color: white;
      font-size: 15px;
      transition: 0.2s ease;
    }

    input,
    select {
      height: 48px;
      padding: 0 15px;
      outline: none;
    }

    input::placeholder {
      color: #858a93;
    }

    input:focus,
    select:focus {
      border-color: #ff7a1a;
      box-shadow: 0 0 0 3px rgba(255, 122, 26, 0.12);
    }

    button {
      height: 48px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      background: linear-gradient(90deg, #ff7818, #ff9730);
      box-shadow: 0 8px 20px rgba(255, 120, 24, 0.2);
    }

    button:hover {
      filter: brightness(1.04);
      transform: translateY(-1px);
    }

    .coupon-row {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 12px;
      align-items: end;
    }

    .values-box {
      margin: 10px 0 18px;
      background: linear-gradient(180deg, #090a0c, #050607);
      border: 1px solid #23252b;
      border-radius: 18px;
      padding: 18px;
    }

    .values-box p {
      font-size: 17px;
      line-height: 1.8;
    }

    .hidden {
      display: none;
    }

    .sub-box {
      margin-top: 12px;
      background: #101114;
      border: 1px solid #252831;
      border-radius: 16px;
      padding: 15px;
    }

    .sub-box p {
      line-height: 1.6;
    }

    .sub-box strong {
      color: #ff9a3d;
    }

    .qr-box {
      text-align: center;
    }

    .qr-img {
      width: 220px;
      max-width: 100%;
      border-radius: 16px;
      border: 1px solid #2f323a;
      margin-top: 10px;
    }

    .send-btn {
      margin-top: 10px;
    }

    .status {
      margin-top: 16px;
      background: #101114;
      border: 1px solid #23262c;
      border-radius: 14px;
      padding: 13px 14px;
      color: #d4d4d4;
      font-size: 14px;
      white-space: pre-line;
    }

    @media (max-width: 720px) {
      .row,
      .coupon-row {
        grid-template-columns: 1fr;
      }

      .container {
        padding: 26px 18px 20px;
      }

      h1 {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Compra de Cargo</h1>

    <div class="row">
      <div class="field">
        <label for="id">ID</label>
        <input id="id" type="text" placeholder="Digite seu ID">
      </div>

      <div class="field">
        <label for="discord">ID do Discord</label>
        <input id="discord" type="text" placeholder="Digite o ID do Discord">
      </div>
    </div>

    <div class="field">
      <label for="cargo">Cargo desejado</label>
      <select id="cargo" onchange="atualizarValor()">
        <option value="">Selecione o cargo</option>
        <option value="700000|5">Mecânico Junior</option>
        <option value="800000|6">Mecânico Auxiliar</option>
        <option value="900000|9">Mecânico de Manutenção</option>
        <option value="1000000|8">Mecânico Automotivo</option>
        <option value="1500000|9">Mecânico Sênior</option>
        <option value="2000000|10">Mecânico</option>
        <option value="2700000|12">Mecânico Chefe</option>
        <option value="3000000|14">Encarregado de Oficina</option>
        <option value="3700000|16">Supervisor da Mecânica</option>
        <option value="4200000|18">Mecânico Master</option>
        <option value="5000000|20">Líder da Mecânica</option>
      </select>
    </div>

    <div class="coupon-row">
      <div class="field">
        <label for="cupom">Cupom</label>
        <input id="cupom" type="text" placeholder="Ex: MECPASCOA30">
      </div>

      <div class="field">
        <label>&nbsp;</label>
        <button type="button" onclick="aplicarCupom()">Aplicar Cupom</button>
      </div>
    </div>

    <div class="values-box">
      <p id="ingame">Valor in-game: -</p>
      <p id="pix">Valor PIX: -</p>
    </div>

    <div class="field">
      <label for="pagamento">Forma de pagamento</label>
      <select id="pagamento" onchange="mostrarOpcao()">
        <option value="">Selecione</option>
        <option value="ingame">In Game</option>
        <option value="pix">PIX</option>
      </select>
    </div>

    <div id="ingameDiv" class="hidden">
      <div class="field">
        <label for="printPix">Comprovante In Game</label>
        <input type="file" id="printPix" accept="image/*">
      </div>
    </div>

    <div id="pixDiv" class="hidden">
      <div class="field">
        <label for="tipoPix">Opção PIX</label>
        <select id="tipoPix" onchange="mostrarPix(this.value)">
          <option value="">Escolha</option>
          <option value="copia">PIX copia e cola</option>
          <option value="qr">QR Code</option>
        </select>
      </div>

      <div id="copia" class="hidden sub-box">
        <p><strong>Chave PIX:</strong></p>
        <p id="chavePixTexto">976aa9d5-9a78-4eab-810a-edc839aae2e9</p>
      </div>

      <div id="qr" class="hidden sub-box qr-box">
        <p><strong>QR Code:</strong></p>
        <img src="qrcode.jpeg" alt="QR Code PIX" class="qr-img">
      </div>

      <button type="button" onclick="confirmarPix()">Confirmar Pagamento</button>

      <div id="comprovantePix" class="hidden">
        <div class="field" style="margin-top: 12px;">
          <label for="printPixConfirmado">Comprovante PIX</label>
          <input type="file" id="printPixConfirmado" accept="image/*">
        </div>

        <div class="field">
          <label for="vendedor">Quem vendeu o cargo</label>
          <input id="vendedor" type="text" placeholder="Nome de quem vendeu">
        </div>
      </div>
    </div>

    <button class="send-btn" onclick="enviar()">Enviar Solicitação</button>

    <div id="status" class="status">Aguardando envio...</div>
  </div>

  <script>
    const webhook = "https://discord.com/api/webhooks/1487694906326777918/oddww0-WkogVL_fmx7rTgfsfiq0LKOxQj2XhnXRFZb8FCsBqJeewPQQiyYVasZNCygOn";
    const CLOUD_NAME = "dci9bcb1u";
    const UPLOAD_PRESET = "mecanica";

    let valorInGame = 0;
    let valorPix = 0;
    let desconto = false;

    function setStatus(texto) {
      document.getElementById("status").innerText = texto;
    }

    function atualizarValor() {
      const cargo = document.getElementById("cargo").value;
      if (!cargo) return;

      const valores = cargo.split("|");
      valorInGame = parseInt(valores[0]) || 0;
      valorPix = parseFloat(valores[1]) || 0;
      desconto = false;

      atualizarTela();
    }

    function aplicarCupom() {
      const cupom = document.getElementById("cupom").value.trim().toUpperCase();

      if (!valorInGame && !valorPix) {
        alert("Selecione um cargo primeiro.");
        return;
      }

      if (cupom === "MECPASCOA30" && !desconto) {
        valorInGame *= 0.7;
        valorPix *= 0.7;
        desconto = true;
        atualizarTela();
        alert("30% aplicado 🔥");
      } else {
        alert("Cupom inválido ou já usado");
      }
    }

    function atualizarTela() {
      document.getElementById("ingame").innerText =
        "Valor in-game: " + valorInGame.toLocaleString("pt-BR");

      document.getElementById("pix").innerText =
        "Valor PIX: R$ " + valorPix.toFixed(2).replace(".", ",");
    }

    function mostrarOpcao() {
      const tipo = document.getElementById("pagamento").value;

      document.getElementById("ingameDiv").classList.add("hidden");
      document.getElementById("pixDiv").classList.add("hidden");

      if (tipo === "ingame") {
        document.getElementById("ingameDiv").classList.remove("hidden");
      }

      if (tipo === "pix") {
        document.getElementById("pixDiv").classList.remove("hidden");
      }
    }

    function mostrarPix(valor) {
      document.getElementById("copia").classList.add("hidden");
      document.getElementById("qr").classList.add("hidden");

      if (valor === "copia") {
        document.getElementById("copia").classList.remove("hidden");
      }

      if (valor === "qr") {
        document.getElementById("qr").classList.remove("hidden");
      }
    }

    function confirmarPix() {
      document.getElementById("comprovantePix").classList.remove("hidden");
    }

    async function uploadImagem(file) {
      const formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", UPLOAD_PRESET);

      const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
        method: "POST",
        body: formData
      });

      const data = await res.json();

      if (!data.secure_url) {
        throw new Error("Erro no upload da imagem");
      }

      return data.secure_url;
    }

    async function enviar() {
      try {
        const tipo = document.getElementById("pagamento").value;

        if (!tipo) {
          alert("Selecione a forma de pagamento.");
          return;
        }

        const id = document.getElementById("id").value.trim();
        const discord = document.getElementById("discord").value.trim();
        const cargo = document.getElementById("cargo").selectedOptions[0]?.text || "Não informado";
        const vendedor = document.getElementById("vendedor")?.value.trim() || "N/A";
        const data = new Date().toLocaleString("pt-BR");

        if (!id || !discord || document.getElementById("cargo").value === "") {
          alert("Preencha ID, ID do Discord e cargo.");
          return;
        }

        let file = null;

        if (tipo === "ingame") {
          file = document.getElementById("printPix").files[0];
        } else {
          file = document.getElementById("printPixConfirmado").files[0];
        }

        let imagemURL = "";

        if (file) {
          setStatus("Enviando comprovante...");
          imagemURL = await uploadImagem(file);
          setStatus("Comprovante enviado ✅");
        }

        const pagamentoTexto = tipo === "ingame" ? "In Game" : "PIX";

        const valorTexto = tipo === "ingame"
          ? valorInGame.toLocaleString("pt-BR")
          : "R$ " + valorPix.toFixed(2).replace(".", ",");

        const comissaoTexto = tipo === "ingame"
          ? Math.floor(valorInGame * 0.15).toLocaleString("pt-BR")
          : "R$ " + (valorPix * 0.15).toFixed(2).replace(".", ",");

        setStatus("Enviando para o Discord...");

        const mensagem = {
          username: "Compre Cargo Mecânica BMI",
          embeds: [
            {
              title: "🧾 Nova Compra de Cargo",
              color: 0xf97316,
              description:
                "**📅 Data:** " + data + "\n" +
                "**🆔 ID:** " + id + "\n" +
                "**👤 Discord:** <@" + discord + ">\n" +
                "**🔧 Cargo:** " + cargo + "\n" +
                "**💳 Pagamento:** " + pagamentoTexto + "\n" +
                "**💵 Valor:** " + valorTexto + "\n" +
                "**📊 Comissão (15%):** " + comissaoTexto + "\n" +
                "**🧑‍💼 Vendedor:** " + vendedor,
              image: imagemURL ? { url: imagemURL } : undefined,
              footer: {
                text: "Sistema automático - Mecânica BMI"
              }
            }
          ]
        };

        const resposta = await fetch(webhook, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(mensagem)
        });

        if (!resposta.ok) {
          throw new Error("Erro no webhook: " + resposta.status);
        }

        setStatus("Enviado com sucesso ✅");
        alert("Enviado com sucesso 🔥");

      } catch (erro) {
        console.error(erro);
        setStatus("Erro ao enviar ❌\n" + erro.message);
        alert("Erro ao enviar ❌");
      }
    }
  </script>

</body>
</html>
