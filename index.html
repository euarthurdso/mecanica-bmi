<!DOCTYPE html>
<html>
<head>
  <title>Mecânica BMI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle, #1a1a1a, #000000);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    .logo {
      width: 150px;
      margin-bottom: 30px;
      animation: fadeIn 1.5s ease;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 15px;
      opacity: 0;
      transform: translateY(20px);
      animation: slideUp 1s ease forwards;
      animation-delay: 1s;
    }

    button {
      padding: 15px 30px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      background: linear-gradient(45deg, #f97316, #fb923c);
      color: white;
      transition: 0.3s;
      box-shadow: 0 0 15px rgba(249, 115, 22, 0.4);
    }

    button:hover {
      transform: scale(1.07);
      box-shadow: 0 0 25px rgba(249, 115, 22, 0.8);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes slideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <img src="logo.png" class="logo">

  <div class="menu">
    <button onclick="window.location.href='pagamento.html'">
      Solicitar Pagamento
    </button>

    <button onclick="window.location.href='comprar cargo.html'">
      Comprar Cargo
    </button>
  </div>

</body>
</html>
