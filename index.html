<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mecânica BMI</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(255, 115, 0, 0.14), transparent 35%),
        #000;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      color: white;
    }

    .container {
      width: 100%;
      max-width: 760px;
      background: #0b0b0d;
      border: 1px solid #242428;
      border-radius: 24px;
      padding: 40px 28px 28px;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.02) inset,
        0 20px 50px rgba(0, 0, 0, 0.55),
        0 0 30px rgba(255, 102, 0, 0.08);
      text-align: center;
    }

    .logo {
      width: 110px;
      height: 110px;
      object-fit: cover;
      border-radius: 50%;
      border: 2px solid #ff6b00;
      margin-bottom: 20px;
      box-shadow: 0 0 20px rgba(255, 107, 0, 0.25);
    }

    h1 {
      color: #ff6b00;
      font-size: 38px;
      margin-bottom: 10px;
      font-weight: 800;
      letter-spacing: 0.4px;
    }

    p {
      color: #d0d0d0;
      margin-bottom: 28px;
      font-size: 16px;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-top: 10px;
    }

    button {
      width: 100%;
      height: 54px;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
      color: white;
      background: linear-gradient(90deg, #ff7818, #ff9730);
      box-shadow: 0 8px 20px rgba(255, 120, 24, 0.2);
      transition: 0.2s ease;
    }

    button:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }

    .footer {
      margin-top: 24px;
      color: #8f8f8f;
      font-size: 14px;
    }

    @media (max-width: 640px) {
      .container {
        padding: 28px 18px 20px;
      }

      h1 {
        font-size: 30px;
      }

      p {
        font-size: 15px;
      }

      button {
        height: 50px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <img src="logo.png" alt="Logo Mecânica BMI" class="logo">

    <h1>Mecânica BMI</h1>
    <p>Escolha uma opção para continuar no sistema.</p>

    <div class="buttons">
      <button onclick="window.location.href='pagamento.html'">
        Solicitar Pagamento
      </button>

      <button onclick="window.location.href='comprar-cargo.html'">
        Comprar Cargo
      </button>

      <button onclick="window.location.href='comprar-horas.html'">
        Comprar Horas
      </button>
    </div>

    <div class="footer">
      Sistema oficial da Mecânica BMI
    </div>
  </div>

</body>
</html>
