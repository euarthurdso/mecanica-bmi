<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solicitar Pagamento - Mecânica BMI</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      background: #111;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 0 20px rgba(249, 115, 22, 0.15);
    }

    h1 {
      text-align: center;
      color: #f97316;
      margin-bottom: 24px;
    }

    .campo {
      margin-bottom: 14px;
    }

    .linha {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: #fb923c;
    }

    input, select, textarea, button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
    }

    input, select, textarea {
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #333;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    button {
      background: linear-gradient(45deg, #f97316, #fb923c);
      color: #fff;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.2s ease;
    }

    button:hover {
      transform: scale(1.02);
    }

    .info-box {
      background: #0d0d0d;
      border: 1px solid #2b2b2b;
      border-radius: 12px;
      padding: 14px;
      margin-top: 14px;
      margin-bottom: 14px;
    }

    .info-box p {
      margin: 8px 0;
    }

    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      background: #181818;
      border: 1px solid #333;
      color: #ddd;
      white-space: pre-line;
    }

    @media (max-width: 640px) {
      .linha {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Solicitar Pagamento</h1>

    <div class="campo">
      <label for="nome">Seu nome</label>
      <input id="nome" type="text" placeholder="Digite seu nome">
    </div>

    <div class="linha">
      <div class="campo">
        <label for="id">ID</label>
        <input id="id" type="text" placeholder="Digite seu ID">
      </div>

      <div class="campo">
        <label for="discord">ID do Discord</label>
        <input id="discord" type="text" placeholder="Digite o ID do Discord">
      </div>
    </div>

    <div class="campo">
      <label for="cargo">Cargo + salário</label>
      <select id="cargo" onchange="atualizarSalario()">
        <option value="">Selecione o cargo</option>
        <option value="2000000">Executivo - 2kk</option>
        <option value="1700000">Sócio Executivo - 1kk 700k</option>
        <option value="1290000">Diretor Administrativo - 1kk 290k</option>
        <option value="1150000">Gerente Geral - 1kk 150k</option>
        <option value="950000">Diretor Auxiliar - 950k</option>
        <option value="820000">Gerente Da Mecânica - 820k</option>
        <option value="780000">SubGerente - 780k</option>
        <option value="740000">Supervisor Geral - 740k</option>
        <option value="700000">Supervisor De Plantão - 700k</option>
        <option value="670000">Líder Mecânica - 670k</option>
        <option value="620000">Mecânica Master - 620k</option>
        <option value="570000">Supervisor Da Mecânica - 570k</option>
        <option value="520000">Encarregado De Oficina - 520k</option>
        <option value="460000">Mecânico Chefe - 460k</option>
        <option value="420000">Mecânico - 420k</option>
        <option value="380000">Mecânico Sênior - 380k</option>
        <option value="340000">Mecânico Automotivo - 340k</option>
        <option value="300000">Mecânico De Manutenção - 300k</option>
        <option value="260000">Mecânico Auxiliar - 260k</option>
        <option value="220000">Mecânico Junior - 220k</option>
        <option value="180000">Mecânico Estagiário - 180k</option>
        <option value="150000">Aprendiz Mecânica - 150k</option>
      </select>
    </div>

    <div class="info-box">
      <p id="salario">Salário: -</p>
    </div>

    <div class="campo">
      <label for="horario">Horário que quer receber</label>
      <input id="horario" type="text" placeholder="Ex: 20:00">
    </div>

    <div class="campo">
      <label for="meta">Data da meta financeira</label>
      <input id="meta" type="text" placeholder="Ex: 30/03/2026">
    </div>

    <div class="campo">
      <label for="bonus">Bônus</label>
      <textarea id="bonus" placeholder="Ex: ranking horas, recrutamento"></textarea>
    </div>

    <button type="button" onclick="enviar()">Enviar Solicitação</button>

    <div id="status" class="status">Aguardando envio...</div>
  </div>

  <script>
    const webhook = "https://discordapp.com/api/webhooks/1487676588438065203/yW5ZFZvC-zZp_3Bjvxim3V3jpYPxs3NpgW0UJ5bqCbtdhO-U8HVVca0A0Ns5h5qYGdf-";
    let salarioValor = 0;

    function setStatus(texto) {
      document.getElementById("status").innerText = texto;
    }

    function formatarDinheiro(valor) {
      return valor.toLocaleString("pt-BR");
    }

    function atualizarSalario() {
      const cargo = document.getElementById("cargo");
      salarioValor = parseInt(cargo.value, 10) || 0;

      document.getElementById("salario").innerText =
        salarioValor ? "Salário: " + formatarDinheiro(salarioValor) : "Salário: -";
    }

    async function enviar() {
      try {
        setStatus("Preparando solicitação...");

        const nome = document.getElementById("nome").value.trim();
        const id = document.getElementById("id").value.trim();
        const discord = document.getElementById("discord").value.trim();
        const horario = document.getElementById("horario").value.trim();
        const meta = document.getElementById("meta").value.trim() || "Não informado";
        const bonus = document.getElementById("bonus").value.trim() || "Não informado";

        const cargoSelect = document.getElementById("cargo");
        const cargoNome = cargoSelect.options[cargoSelect.selectedIndex]?.text || "";

        if (!nome || !id || !discord || !cargoSelect.value || !horario) {
          alert("Preencha nome, ID, ID do Discord, cargo e horário.");
          return;
        }

        const data = new Date().toLocaleString("pt-BR");

        const mensagem = {
          username: "Pagamentos Mecânica BMI",
          embeds: [
            {
              title: "💰 Nova Solicitação de Pagamento",
              color: 0xf97316,
              description:
                "**📅 Data:** " + data + "\n" +
                "**👤 Nome:** " + nome + "\n" +
                "**🆔 ID:** " + id + "\n" +
                "**💬 Discord:** <@" + discord + ">\n" +
                "**🔧 Cargo:** " + cargoNome + "\n" +
                "**💵 Salário:** " + formatarDinheiro(salarioValor) + "\n" +
                "**⏰ Horário para receber:** " + horario + "\n" +
                "**📊 Data da meta financeira:** " + meta + "\n" +
                "**🎁 Bônus:** " + bonus,
              footer: {
                text: "Sistema automático - Mecânica BMI"
              }
            }
          ]
        };

        setStatus("Enviando para o Discord...");

        const resposta = await fetch(webhook, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(mensagem)
        });

        if (!resposta.ok) {
          throw new Error("Erro no webhook: " + resposta.status);
        }

        setStatus("Solicitação enviada com sucesso ✅");
        alert("Solicitação enviada com sucesso 🔥");

      } catch (erro) {
        console.error(erro);
        setStatus("Erro ao enviar ❌\n" + erro.message);
        alert("Erro ao enviar ❌");
      }
    }
  </script>
</body>
</html>
